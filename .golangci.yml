# golangci-lint configuration for SignalForge
# See https://golangci-lint.run/usage/configuration/
# Config format: v1 (golangci-lint v1.64.8)

run:
  concurrency: 4
  timeout: 5m
  issues-exit-code: 1

linters:
  disable-all: true
  enable:
    # Core linters
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused

    # Formatting & style
    - gofmt
    - gofumpt
    - goimports
    - revive
    - gci
    - whitespace
    - decorder
    - godot
    - misspell
    - stylecheck

    # Correctness
    - bodyclose
    - noctx
    - unconvert
    - nilerr
    - nilnil
    - usestdlibvars
    - musttag
    - sloglint
    - perfsprint
    - mirror
    - reassign
    - forcetypeassert
    - durationcheck
    - containedctx
    - contextcheck
    - makezero
    - gosec
    - errname
    - errorlint
    - exhaustive
    - tenv
    - prealloc
    - predeclared
    - dupword
    - errchkjson
    - nestif
    - nakedret
    - dogsled
    - asasalint
    - asciicheck
    - bidichk
    - gocheckcompilerdirectives

    # Complexity
    - gocyclo
    - gocognit
    - goconst
    - gocritic
    - dupl
    - funlen
    - cyclop
    - interfacebloat

    # Best practices
    - wrapcheck
    - wsl
    - nolintlint
    - ireturn
    - inamedparam
    - loggercheck
    - unparam
    - thelper
    - testifylint
    - grouper
    - importas

linters-settings:
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/moontechs/signalforge)
  gocognit:
    min-complexity: 30
  goconst:
    min-len: 3
    min-occurrences: 3
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - ifElseChain
      - whyNoLint
  gocyclo:
    min-complexity: 20
  godot:
    scope: all
  gofumpt:
    extra-rules: true
  ireturn:
    allow:
      - empty
      - error
      - stdlib
      - anon
      - generic
  nolintlint:
    require-explanation: true
    require-specific: true
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  sloglint:
    args-on-sep-lines: true
    no-global: "all"
    context: "all"
  unparam:
    check-exported: true
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
      - .WithMessage(
      - .WithMessagef(
      - status.Errorf(
    ignoreSigRegexps:
      - \.New.*Error\(
  wsl:
    strict-append: true
    allow-assign-and-anything: false
    allow-cuddle-declarations: false
    allow-trailing-comment: false
    force-case-trailing-whitespace: 0
    force-err-cuddling: true
    force-short-decl-cuddling: true
  dupl:
    threshold: 100
  funlen:
    lines: 80
    statements: 50
  cyclop:
    max-complexity: 20
    package-average: 10.0

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - bodyclose
        - dupl
        - errcheck
        - goconst
        - gosec
        - noctx
        - wrapcheck
        - funlen
        - gocyclo
    - path: cmd/
      linters:
        - gochecknoglobals
        - gochecknoinits
    - linters:
        - revive
      text: "package-comments: should have a package comment"
    - linters:
        - gocritic
      text: "ifElseChain: consider to rewrite"
    - linters:
        - gocritic
      text: "unnamedResult: consider to give name"
  exclude:
    - "comment on exported"
    - "should have a package comment"
  exclude-case-sensitive: false